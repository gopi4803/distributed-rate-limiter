x-common-env: &common-env
  REDIS_HOST: redis
  REDIS_PORT: 6379

services:

  redis:
    image: redis:7-alpine

    ports:
      - "6379:6379"

    restart: unless-stopped

    networks:
      - drl-network

  app1:

    build:
      context: ..
      dockerfile: Dockerfile

    image: distributed-rate-limiter

    restart: unless-stopped

    ports:
      - "8080:8080"

    env_file:
      - benchmark.env

    environment:
      <<: *common-env
      HOSTNAME: drl-app1

    depends_on:
      - redis

    networks:
      - drl-network

  app2:

    build:
      context: ..
      dockerfile: Dockerfile

    image: distributed-rate-limiter

    restart: unless-stopped

    ports:
      - "8081:8080"

    env_file:
      - benchmark.env

    environment:
      <<: *common-env
      HOSTNAME: drl-app2

    depends_on:
      - redis

    networks:
      - drl-network

  app3:

    build:
      context: ..
      dockerfile: Dockerfile

    image: distributed-rate-limiter

    restart: unless-stopped

    ports:
      - "8082:8080"

    env_file:
      - benchmark.env

    environment:
      <<: *common-env
      HOSTNAME: drl-app3

    depends_on:
      - redis

    networks:
      - drl-network

  nginx:

    image: nginx:alpine

    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - app1
      - app2
      - app3

    networks:
      - drl-network

networks:
  drl-network:
    driver: bridge