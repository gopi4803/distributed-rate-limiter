events {
    worker_connections 4096;
    multi_accept on;
}

http {

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;

    upstream rate_limiter_cluster {

        least_conn;

        keepalive 128;

        server app1:8080;
        server app2:8080;
        server app3:8080;
    }

    server {

        listen 80 reuseport;

        location / {

            proxy_http_version 1.1;

            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_pass http://rate_limiter_cluster;
        }
    }
}