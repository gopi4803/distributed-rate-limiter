spring.application.name=distributed-rate-limiter
spring.data.redis.host=localhost
spring.data.redis.port=6379

management.endpoints.web.exposure.include=health,info,metrics,prometheus

# Always show health details
management.endpoint.health.show-details=always

# Enable Prometheus endpoint
management.endpoint.prometheus.access=unrestricted

management.metrics.enable.all=true

management.metrics.distribution.percentiles-histogram.ratelimiter.request.duration=true

management.metrics.distribution.percentiles.ratelimiter.request.duration=0.5,0.95,0.99
